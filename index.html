<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGITAL SLEEP OPTIMISER</title>
    <link href='https://fonts.googleapis.com/css?family=Open+Sans:400,700' rel='stylesheet' type='text/css'>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a; 
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --electric-border-color: #02A2F8;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        /* --- HERO & 3D TEXT SECTION --- */
        .hero-section {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: visible;
        }

        #text-container {
            display: block;
            position: relative;
            width: 90vw; 
            height: 22vw;
        }

        .hero-section h1, .copy {
            font-family: "Lilita One", cursive;
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
            /* Adjusted size for "Your SleepScore" length */
            font-size: 11vw; 
            display: block;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            line-height: 1;
            width: 100%;
            text-align: center;
            margin: 0;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .hero-section h1 { color: #e7e7e7; z-index: 50; }
        .copy-1 { color: #02A2F8; z-index: 40; } 
        .copy-2 { color: #00b1f2af; z-index: 30; } 
        .copy-3 { color: #4f8ad1; z-index: 20; } 
        .copy-4 { color: #166894c5; z-index: 10; } 

        .scroll-arrow {
            position: absolute;
            bottom: 40px;
            cursor: pointer;
            animation: bounce 2s infinite;
            opacity: 0.7;
            transition: opacity 0.3s;
            z-index: 60;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-15px);}
            60% {transform: translateY(-7px);}
        }

        /* --- STICKY ZOOM TRACK --- */
        .zoom-track {
            position: relative;
            height: 350vh; 
            width: 100%;
        }

        .sticky-wrapper {
            position: sticky;
            top: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .content-container {
            width: 100%;
            padding: 50px 0;
            position: relative;
            z-index: 20;
            background: var(--bg-color);
        }
    </style>
</head>
<body>


    <div class="content-container" id="main-content">
        <object type="text/html" data="sleepscoresurvey.html" width="100%" height="800"></object>
        <object type="text/html" data="sleepscoreratinggaugetitle.html" width="100%" height="290"></object>
        <object type="text/html" data="gauge.html" width="100%" height="600"></object>
        <object type="text/html" data="returntofigma.html" width="100%" height="62"></object>

    </div>

    <script>
        function scrollToContent() {
            document.getElementById('main-content').scrollIntoView({ behavior: 'smooth' });
        }

        /* 3D TEXT LOGIC (Your Original Header Script) */
        const mouse = { x: 0, y: 0 };
        const center = { x: 0, y: 0 };
        const distance = { x: 0, y: 0 };
        const lerped = { x: 0, y: 0 };
        let isSimulating = true;

        const container = document.getElementById("text-container");
        const copies = document.querySelectorAll(".copy");

        function getCenter() {
            const rect = container.getBoundingClientRect();
            center.x = rect.left + rect.width / 2;
            center.y = rect.top + rect.height / 2;
        }

        function onMouseMove(e) {
            isSimulating = false;
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            distance.x = center.x - mouse.x;
            distance.y = center.y - mouse.y;
        }

        function autoFloat(t) {
            distance.x = Math.sin(t / 600) * (window.innerWidth * 0.15);
            distance.y = Math.cos(t / 600) * (window.innerHeight * 0.05);
        }

        function animateHeader(t) {
            if (isSimulating) autoFloat(t);
            lerped.x += (distance.x - lerped.x) * 0.15;
            lerped.y += (distance.y - lerped.y) * 0.15;

            copies.forEach((copy, i) => {
                const index = i + 1;
                const y = index * lerped.y * 0.035;
                const z = index * -16;
                const r = index * 2.5 * (lerped.x * 0.001);
                const s = index * 2.5 * (lerped.x * 0.001);
                copy.style.transform = `translate(-50%, -50%) perspective(500px) translate3d(0px, ${y}px, ${z}px) rotate(${r}deg) skew(${s}deg)`;
            });

            const mainH1 = document.querySelector('.hero-section h1');
            if(mainH1) mainH1.style.transform = `translate(-50%, -50%)`;
            requestAnimationFrame(animateHeader);x
        }

        /* 3D SCROLL COORDINATION */
        const track = document.getElementById('zoom-scroll-track');
        const frame = document.getElementById('zoom-iframe');

        window.addEventListener('scroll', () => {
            const rect = track.getBoundingClientRect();
            const windowHeight = window.innerHeight;
            let progress = -rect.top / (rect.height - windowHeight);
            let clamped = Math.max(0, Math.min(1, progress));

            if (frame.contentWindow) {
                frame.contentWindow.postMessage({ type: 'SET_PROGRESS', progress: clamped }, '*');
            }
        });

        window.addEventListener("resize", getCenter);
        document.addEventListener("mousemove", onMouseMove);
        getCenter();
        requestAnimationFrame(animateHeader);
    </script>
</body>
</html>
