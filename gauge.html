<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Score Gauge</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background-color: transparent;
  font-family: 'Segoe UI', sans-serif;
  color: white;
}

.main-layout {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 40px;
}

/* INPUT AREA */
.input-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

/* GAUGE */
.gauge-wrap {
  position: relative;
  width: 260px;
  height: 260px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;

  background: conic-gradient(
    from 210deg,
    #ef4444 0deg 60deg,
    #e0924e 60deg 120deg,
    #ecd842 120deg 180deg,
    #46e47d 180deg 240deg,
    #05a23e 240deg 300deg,
    transparent 300deg
  );

  --ptr-deg: -120deg;
}

.gauge-wrap::before {
  content: '';
  position: absolute;
  width: 220px;
  height: 220px;
  background: #0f172a;
  border-radius: 50%;
  z-index: 1;
}

/* NEEDLE */
.gauge-wrap::after {
  content: '';
  position: absolute;
  bottom: 50%;
  left: 50%;
  width: 4px;
  height: 110px;
  background: white;
  border-radius: 4px;
  transform-origin: bottom center;
  transform: translateX(-50%) rotate(var(--ptr-deg));
  transition: transform 1s ease-in-out;
  z-index: 5;
}

.center-point {
  position: absolute;
  width: 18px;
  height: 18px;
  background: white;
  border-radius: 50%;
  z-index: 6;
}

.data-view {
  position: relative;
  z-index: 10;
  text-align: center;
}

.big-num {
  font-size: 4rem;
  font-weight: 800;
  margin: 0;
}

#label-text {
  font-weight: bold;
  letter-spacing: 1px;
}

.sub-text {
  font-size: 0.8rem;
  opacity: 0.6;
  letter-spacing: 2px;
}

/* EXCELLENT PULSE */
.sonar-ring {
  position: absolute;
  width: 100%;
  height: 100%;
  border: 4px solid #05a23e;
  border-radius: 50%;
  opacity: 0;
}

.gauge-wrap.excellent .sonar-ring {
  animation: sonar-effect 1.5s infinite;
}

@keyframes sonar-effect {
  0% { transform: scale(1); opacity: 0.5; }
  100% { transform: scale(1.4); opacity: 0; }
}

input, button {
  padding: 8px 14px;
  border-radius: 6px;
  border: none;
}

button {
  background: #166894c5;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="main-layout">

  <div class="gauge-wrap" id="gauge">
    <div class="sonar-ring"></div>
    <div class="center-point"></div>

    <div class="data-view">
      <p id="label-text">READY</p>
      <p class="big-num" id="speed-num">0</p>
      <p class="sub-text">SCORE</p>
    </div>
  </div>

  <div class="input-area">
    <input type="number" id="user-input" min="3" max="27" value="15">
    <button id="test-btn">View Sleepscore Rating</button>
  </div>

</div>

<script>
const gauge = document.getElementById("gauge");
const speedNum = document.getElementById("speed-num");
const labelText = document.getElementById("label-text");
const input = document.getElementById("user-input");
const btn = document.getElementById("test-btn");

btn.addEventListener("click", () => {
  let val = parseInt(input.value);

  if (isNaN(val)) val = 3;
  if (val < 3) val = 3;
  if (val > 27) val = 27;

  // Convert 3–27 to -120deg → 120deg
  const percent = (val - 3) / 24;
  const rotation = (percent * 240) - 120;

  gauge.style.setProperty("--ptr-deg", rotation + "deg");

  // Update label
  if (val <= 8) {
    labelText.innerText = "VERY BAD";
    labelText.style.color = "#ef4444";
  } 
  else if (val <= 14) {
    labelText.innerText = "BAD";
    labelText.style.color = "#e0924e";
  } 
  else if (val <= 19) {
    labelText.innerText = "OKAY";
    labelText.style.color = "#ecd842";
  } 
  else if (val <= 24) {
    labelText.innerText = "GOOD";
    labelText.style.color = "#46e47d";
  } 
  else {
    labelText.innerText = "EXCELLENT";
    labelText.style.color = "#05a23e";
    gauge.classList.add("excellent");
  }

  if (val < 25) gauge.classList.remove("excellent");

  speedNum.innerText = val;
});
</script>

</body>
</html>
